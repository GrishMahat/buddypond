    <!-- CENTER: Inventory -->
    <div class="panel inventory-panel">
      <div class="inventory-filters">
        <label for="filter-inventory-type">Filter by Type:</label>
        <select id="filter-inventory-type">
          <option value="all">All Types</option>
          <!-- JS fills types -->
        </select>
        <label for="sort-inventory">Sort by:</label>
        <select id="sort-inventory">
          <option value="rarity">Rarity</option>
          <option value="name">Name</option>
          <option value="type">Type</option>
          <!-- JS fills types -->
        </select>
        <!-- sort direction arrow -->
        <button id="sort-direction" data-direction="asc" class="sort-direction" title="Toggle Sort Direction">⬆️</button>
        <div class="muted" id="inv-count">0 / 0</div>
      </div>

      <div class="inventory-header">
        <!-- <div class="inventory-title">Backpack</div> -->
      </div>

      <div class="inventory-grid" id="inventoryGrid"></div>

    <!-- Trade modal -->
    <div class="modal" id="tradeModal">
      <div class="box">
        <div style="font-weight:700">Trade Item</div>
        <div class="muted" id="tradeItemTitle">—</div>
        <div class="form-row">
          <input type="text" id="tradeTarget" placeholder="Player name or ID" />
          <input type="number" id="tradeQty" min="1" placeholder="Qty" />
        </div>
        <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
          <button class="btn ghost" id="tradeCancel">Cancel</button>
          <button class="btn" id="tradeConfirm">Send</button>
        </div>
      </div>
