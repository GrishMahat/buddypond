<div class="crafting-container">
  <h1>Crafting Table</h1>

  <div class="crafting-form">
    <div class="crafting-field">
      <label for="crafting-item-defs">Select Item to Craft:</label>
      <select id="crafting-item-defs" class="crafting-item-defs"></select>
    </div>

    <div class="crafting-field">
      <label for="crafting-target-buddy">Select Buddy to Craft For:</label>
      <input type="text" id="crafting-target-buddy" class="crafting-target-buddy" placeholder="Enter buddy name">
    </div>

    <div class="crafting-actions">
      <button id="craft-item" class="craft-item">Craft Item</button>
      <div class="crafting-status"></div>
    </div>
  </div>

  <table class="crafting-item-defs-table ui_table">
    <thead>
      <tr>
        <th>Key</th>
        <th>Name</th>
        <th>Type</th>
        <th>Rarity</th>
        <th>Description</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody class="crafting-item-defs-list"></tbody>
  </table>

  <div class="crafting-item-def-editor-container">
    <h2>Edit Item Definition</h2>
    <div class="crafting-editor-actions">
      <button class="cancel-save-item-def">Cancel</button>
      <button class="save-item-def">Save Item Definition</button>
    </div>
    <div class="crafting-item-def-status"></div>
    <textarea class="crafting-item-def-editor"></textarea>
  </div>
</div>
